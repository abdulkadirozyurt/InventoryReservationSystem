stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_size_bytes: 524288000
    keep_block_size_bytes: 104857600
    retention: 24h

storage:
  trace:
    backend: local
    block:
      blobs_layout: compact
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
