syntax = "proto3";

option csharp_namespace = "InventoryReservationSystem.Contracts.Inventory";

package inventory.v1;

import "inventory_common.proto";

// -----------------------------------------------------------------------------
// Stock operations
// -----------------------------------------------------------------------------

// GetStockRequest: Tek SKU için stok sorgusu.
message GetStockRequest {
  RequestMetadata metadata = 1;

  // sku: Sorgulanacak stok kodu.
  string sku = 2;

  // warehouse_id: Boşsa toplam/genel stok sorgusu gibi yorumlanabilir.
  // Gerçek davranış Faz 3/5'te netleşecek.
  string warehouse_id = 3;
}

// GetStockResponse: Tek SKU için stok cevabı.
message GetStockResponse {
  ResponseMetadata metadata     = 1;
  string           sku          = 2;
  string           warehouse_id = 3;

  // quantity_available: Satılabilir/rezerve edilebilir miktar.
  int32 quantity_available = 4;

  // quantity_reserved: Halihazırda rezervasyonda tutulan miktar.
  int32 quantity_reserved = 5;

  // found: SKU bulundu mu?
  bool found = 6;

  string error_code    = 7;
  string error_message = 8;
}

// IncreaseStockRequest: Admin/operasyonel stok artırma isteği.
message IncreaseStockRequest {
  // metadata: İstek izleme ve korelasyon verileri.
  RequestMetadata metadata = 1;

  // sku: Stoğu artırılacak ürün kodu.
  string sku = 2;

  // warehouse_id: Stoğu artırılacak depo kimliği.
  string warehouse_id = 3;

  // quantity: Artırılacak miktar. Pozitif olmalı.
  int32 quantity = 4;

  // reason: Stok artışının nedeni. Örn: "Restock", "Correction", "Return", vb.
  string reason = 5;
}

// DecreaseStockRequest: Admin/operasyonel stok azaltma isteği.
message DecreaseStockRequest {
  RequestMetadata metadata = 1;

  // sku: Stoğu azaltılacak ürün kodu.
  string sku = 2;

  // warehouse_id: Stoğu azaltılacak depo kimliği.
  string warehouse_id = 3;

  // quantity: Azaltılacak miktar. Pozitif olmalı.
  int32 quantity = 4;

  // reason: Azaltma nedeni. Audit trail için gereklidir.
  string reason = 5;
}

// StockAdjustmentResponse: Stok artırma/azaltma işleminin sonucu.
message StockAdjustmentResponse {
  ResponseMetadata metadata           = 1;
  bool             success            = 2;
  string           sku                = 3;
  string           warehouse_id       = 4;
  int32            quantity_available = 5;
  int32            quantity_reserved  = 6;
  string           error_code         = 7;
  string           error_message      = 8;
}