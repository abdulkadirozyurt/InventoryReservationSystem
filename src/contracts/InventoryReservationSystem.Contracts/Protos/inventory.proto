syntax = "proto3";

option csharp_namespace = "InventoryReservationSystem.Contracts.Inventory";

package inventory.v1;

import "inventory_reservations.proto";
import "inventory_stock.proto";
import "inventory_operations.proto";

// -----------------------------------------------------------------------------
// Inventory gRPC service contract
// -----------------------------------------------------------------------------

// Bu dosya ana gRPC servis giriş noktasıdır.
// Request/response message tanımları sorumluluklarına göre ayrı proto dosyalarına bölündü:
//   inventory_common.proto        -> ortak metadata ve ortak modeller
//   inventory_reservations.proto  -> rezervasyon mesajları
//   inventory_stock.proto         -> stok sorgusu ve stok düzeltme mesajları
//   inventory_operations.proto    -> operasyon mesajları

// service: gRPC servisinin dış dünyaya açtığı metotları gruplar.
// OrderService bu metotları client olarak çağırır, InventoryService server olarak uygular.
service InventoryReservations {
  // rpc: Remote Procedure Call. Yani başka serviste çalışan metodu ağ üzerinden çağırmak.
  // ReserveBatch: Birden fazla SKU'yu tek atomic batch içinde rezerve etmeyi ister.
  rpc ReserveBatch (ReserveBatchRequest) returns (ReserveBatchResponse);

  // ReleaseBatch: Daha önce alınmış rezervasyonu toplu şekilde serbest bırakmayı ister.
  rpc ReleaseBatch (ReleaseBatchRequest) returns (ReleaseBatchResponse);

  // ConfirmReservation: Rezervasyonu kesinleştirir.
  rpc ConfirmReservation (ConfirmReservationRequest) returns (ConfirmReservationResponse);

  // GetStock: Tek SKU için anlık stok bilgisini ister.
  rpc GetStock (GetStockRequest) returns (GetStockResponse);

  // ListInventoryItems: UI katalog/dropdown için gerçek envanter satırlarını ister.
  rpc ListInventoryItems (ListInventoryItemsRequest) returns (ListInventoryItemsResponse);

  // IncreaseStock: Tek SKU için stoğu artırmayı ister.
  rpc IncreaseStock(IncreaseStockRequest) returns (StockAdjustmentResponse);

  // DecreaseStock: Tek SKU için stoğu azaltmayı ister.
  rpc DecreaseStock(DecreaseStockRequest) returns (StockAdjustmentResponse);

  // Aşağıdaki metotlar Faz 5 için şimdiden sözleşmeye eklenen imzalardır.
  // Bu adımda sadece contract var; iş mantığı daha sonra yazılacak.
  rpc RebalanceWarehouse (RebalanceWarehouseRequest) returns (RebalanceWarehouseResponse);
  rpc CreateInventorySnapshot (CreateInventorySnapshotRequest) returns (CreateInventorySnapshotResponse);
  rpc RestoreInventorySnapshot (RestoreInventorySnapshotRequest) returns (RestoreInventorySnapshotResponse);

  // AdminReleaseReservation: Admin tarafından stuck/pending rezervasyonu güvenli ReleaseBatch semantiğiyle serbest bırakır.
  rpc AdminReleaseReservation (AdminReleaseReservationRequest) returns (AdminReleaseReservationResponse);
}
